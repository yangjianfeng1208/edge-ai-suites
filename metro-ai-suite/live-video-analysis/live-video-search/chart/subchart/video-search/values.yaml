global:
  env:
    aggregationContextSeekOffsetSeconds: '0'
    aggregationEnabled: 'true'
    aggregationInitialK: '1000'
    aggregationMaxResults: '20'
    aggregationMinGap: '0'
    aggregationSegmentDuration: '8'
    embeddingModelName: ''
    vsIndexName: video_frame_embeddings
  proxy:
    httpProxy: ''
    httpsProxy: ''
    noProxy: localhost,127.0.0.1,.svc.cluster.local
  registry: ''
  tag: latest
  vssStackTag: ''
images:
  videoSearch:
    repository: video-search

imageOverride:
  registry: ''
  repository: ''
  tag: ''

replicaCount: 1

imagePullPolicy: Always

service:
  type: ClusterIP
  port: 8000

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  timeoutSeconds: 30
  periodSeconds: 30
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  timeoutSeconds: 30
  periodSeconds: 30
  failureThreshold: 10

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 120
