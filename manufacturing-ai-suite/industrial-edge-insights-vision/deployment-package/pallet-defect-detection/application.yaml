---
specSchema: "Application"
schemaVersion: "0.1"
$schema: "https://schema.intel.com/catalog.orchestrator/0.1/schema"

name: pdd-app
version: 2.6.0-rc1
description: "Pallet Defect Detection Sample Application"

helmRegistry: "docker-hub"
chartName: "intel/pallet-defect-detection-reference-implementation"
chartVersion: "2.6.0-rc1"

profiles:
  - name: "default"
    description: "Uses CPU for inferencing"
    valuesFileName: "pdd-values.yaml"
    parameterTemplates:
      - name: env.HOST_IP
        displayName: "IP address of the target Edge Node"
        type: string
        mandatory: true
      - name: webrtcturnserver.username
        displayName: "WebRTC user"
        type: string
        mandatory: true
      - name: webrtcturnserver.password
        displayName: "WebRTC password"
        type: string
        secret: true
        mandatory: true
      - name: env.http_proxy
        displayName: "Http proxy"
        type: string
        default: ""
      - name: env.https_proxy
        displayName: "Https proxy"
        type: string
        default: ""
      - name: env.MINIO_ACCESS_KEY
        displayName: "Minio access key"
        type: string
        secret: true
        mandatory: true
      - name: env.MINIO_SECRET_KEY
        displayName: "Minio secret key"
        type: string
        secret: true
        mandatory: true
      - name: env.POSTGRES_PASSWORD
        displayName: "Postgres database password"
        type: string
        secret: true
        mandatory: true
      - name: env.S3_STORAGE_PORT
        displayName: "MinIO NodePort"
        type: number
        default: "30800"
      - name: config.nginx.ext.http_port
        displayName: "Nginx HTTP NodePort"
        type: number
        default: "30080"
      - name: config.nginx.ext.https_port
        displayName: "Nginx HTTPS NodePort"
        type: number
        default: "30443"
      - name: config.coturn.ext.coturn_tcp_port
        displayName: "Coturn TCP NodePort"
        type: number
        default: "30478"
      - name: config.coturn.ext.coturn_udp_port
        displayName: "Coturn UDP NodePort"
        type: number
        default: "30478"
  - name: "with-intel-gpu"
    description: "Uses Intel GPU for inferencing, needs Intel GPU extension"
    valuesFileName: "pdd-values-with-intel-gpu.yaml"
    parameterTemplates:
      - name: env.HOST_IP
        displayName: "IP address of the target Edge Node"
        type: string
        mandatory: true
      - name: webrtcturnserver.username
        displayName: "WebRTC user"
        type: string
        mandatory: true
      - name: webrtcturnserver.password
        displayName: "WebRTC password"
        type: string
        secret: true
        mandatory: true
      - name: env.http_proxy
        displayName: "Http proxy"
        type: string
        default: ""
      - name: env.https_proxy
        displayName: "Https proxy"
        type: string
        default: ""
      - name: env.MINIO_ACCESS_KEY
        displayName: "Minio access key"
        type: string
        secret: true
        mandatory: true
      - name: env.MINIO_SECRET_KEY
        displayName: "Minio secret key"
        type: string
        secret: true
        mandatory: true
      - name: env.POSTGRES_PASSWORD
        displayName: "Postgres database password"
        type: string
        secret: true
        mandatory: true
      - name: env.S3_STORAGE_PORT
        displayName: "MinIO NodePort"
        type: number
        default: "30800"
      - name: config.nginx.ext.http_port
        displayName: "Nginx HTTP NodePort"
        type: number
        default: "30080"
      - name: config.nginx.ext.https_port
        displayName: "Nginx HTTPS NodePort"
        type: number
        default: "30443"
      - name: config.coturn.ext.coturn_tcp_port
        displayName: "Coturn TCP NodePort"
        type: number
        default: "30478"
      - name: config.coturn.ext.coturn_udp_port
        displayName: "Coturn UDP NodePort"
        type: number
        default: "30478"
      - name: gpu.type
        displayName: "GPU type"
        type: string
        default: "gpu.intel.com/i915"
      - name: gpu.count
        displayName: "GPU count"
        type: number
        default: "1"
  - name: "with-intel-npu"
    description: "Uses NPU for inferencing"
    valuesFileName: "pdd-values-with-intel-npu.yaml"
    parameterTemplates:
      - name: env.HOST_IP
        displayName: "IP address of the target Edge Node"
        type: string
        mandatory: true
      - name: webrtcturnserver.username
        displayName: "WebRTC user"
        type: string
        mandatory: true
      - name: webrtcturnserver.password
        displayName: "WebRTC password"
        type: string
        secret: true
        mandatory: true
      - name: env.http_proxy
        displayName: "Http proxy"
        type: string
        default: ""
      - name: env.https_proxy
        displayName: "Https proxy"
        type: string
        default: ""
      - name: env.MINIO_ACCESS_KEY
        displayName: "Minio access key"
        type: string
        secret: true
        mandatory: true
      - name: env.MINIO_SECRET_KEY
        displayName: "Minio secret key"
        type: string
        secret: true
        mandatory: true
      - name: env.POSTGRES_PASSWORD
        displayName: "Postgres database password"
        type: string
        secret: true
        mandatory: true
      - name: env.S3_STORAGE_PORT
        displayName: "MinIO NodePort"
        type: number
        default: "30800"
      - name: config.nginx.ext.http_port
        displayName: "Nginx HTTP NodePort"
        type: number
        default: "30080"
      - name: config.nginx.ext.https_port
        displayName: "Nginx HTTPS NodePort"
        type: number
        default: "30443"
      - name: config.coturn.ext.coturn_tcp_port
        displayName: "Coturn TCP NodePort"
        type: number
        default: "30478"
      - name: config.coturn.ext.coturn_udp_port
        displayName: "Coturn UDP NodePort"
        type: number
        default: "30478"
      - name: gpu.type
        displayName: "NPU type"
        type: string
        default: "npu.intel.com/accel"
      - name: gpu.count
        displayName: "NPU count"
        type: number
        default: "1"